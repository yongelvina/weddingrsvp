<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <!-- Import Noto Serif Display from Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
        /* Base styles using Noto Serif Display font */
        body { 
            margin: 0; 
            font-family: 'Noto Serif Display', serif; 
            background-color: #fcf8f5; 
            color: #4a4a4a; 
            text-align: center; 
            /* Stop scrolling when the page first loads */
            overflow: hidden; 
        }
        
        /* 1. Full Screen Intro Video Overlay */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1s ease-in-out; /* Smooth slide-up effect when finished */
        }
        #intro-overlay video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            /* Force full 100% opacity visibility */
            opacity: 1 !important; 
        }
        #intro-overlay .hero-content {
            position: relative;
            z-index: 10;
            /* Removed the dark background mask overlay */
            background: transparent; 
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        #intro-overlay h1 { font-size: 3rem; margin: 10px; font-weight: 400; }

        /* Invitation Content Layout sections */
        section { padding: 80px 20px; box-sizing: border-box; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* General Styles */
        h2 { font-size: 2.8rem; color: #8a6d53; margin-bottom: 20px; font-weight: 500; }
        .gallery img { width: 90%; max-width: 400px; margin: 10px; border-radius: 8px; }
        .rundown-item { background: white; padding: 20px; margin: 10px; width: 80%; max-width: 500px; border-radius: 8px;  font-size: 1.1rem; }
        
        /* RSVP Form */
        form { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 95%; max-width: 450px; text-align: left; }
        label { display: block; margin: 15px 0 8px; font-weight: 600; font-size: 1.1rem; color: #5a5a5a; }
        select { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            font-size: 1rem; 
            font-family: 'Noto Serif Display', serif; 
        }
        /* New Styling for Minus / Plus Counter Style Layout */
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 25px;
            gap: 15px;
        }
        .counter-btn {
            background-color: #f5ede6;
            color: #8a6d53;
            border: 1px solid #8a6d53;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            font-weight: bold;
            transition: all 0.2s;
        }
        .counter-btn:hover {
            background-color: #8a6d53;
            color: white;
        }
        .counter-value {
            font-size: 1.4rem;
            font-weight: 600;
            width: 30px;
            text-align: center;
        }
        button { 
            background-color: #8a6d53; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 6px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            font-family: 'Noto Serif Display', serif;
            font-weight: 500;
        }
        button:hover { background-color: #725943; }
    </style>
</head>
<body>

    <!-- 1. INTRO VIDEO OVERLAY (Auto-plays and slides up when finished) -->
    <div id="intro-overlay">
        <!-- Removed 'loop' so the video can actually finish and trigger the jump transition -->
        <video id="landingVideo" autoplay playsinline controls>
            <source src="https://res.cloudinary.com/dv3yb6w5s/video/upload/v1781280505/copy_EBE05908-28DF-47C9-8D4F-CACB0C47E701_aroxax.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1 id="guest-welcome">dear Guest,</h1>
            <p style="font-size: 1rem; font-style: italic;">let's celebrate love! A warm invite to our wedding. <3</p>
        </div>
    </div>

    <!-- MAIN INVITATION CONTENT STARTS HERE -->
    
    <!-- 2. Photos Section -->
    <section class="gallery" style="margin-top: 20px;">
        <h2>Our Moments</h2>
        <img src="https://res.cloudinary.com/dv3yb6w5s/image/upload/v1781103474/1_qq965e.png" alt="Photo 1">
    </section>

    <!-- 3. Event Run Down Section -->
    <section style="background-color: #f5ede6;">
        <h2>Event Schedule</h2>
        <div class="rundown-item">
            <strong style="color: #8a6d53;">04:00 PM</strong><br>Welcome Drinks & Guest Arrival
        </div>
        <div class="rundown-item">
            <strong style="color: #8a6d53;">05:00 PM</strong><br>Holy Matrimony Ceremony
        </div>
        <div class="rundown-item">
            <strong style="color: #8a6d53;">06:30 PM</strong><br>Dinner & Celebration
        </div>
    </section>

    <!-- 4. RSVP Section -->
    <section>
        <h2>RSVP</h2>
        <form id="rsvpForm">
            <!-- Personalized text element directly showing the URL string name -->
            <h3 id="formNameDisplay" style="color: #8a6d53; margin: 0 0 20px 0; font-size: 1.8rem; font-weight: 400;">Dear Guest,</h3>
            
            <!-- Hidden input holding values safely for sheet processing background logic -->
            <input type="hidden" id="formName" value="Guest">

            <label for="attendance">Will you attend?</label>
            <select id="attendance" required>
                <option value="">Choose an option</option>
                <option value="Yes">Yes, I will be there!</option>
                <option value="No">Sorry, I cannot make it</option>
            </select>

            <!-- Fixed: Changed from dropdown menu to minus / plus button step selection framework -->
            <label>Add-ons (Plus Ones)</label>
            <div class="counter-container">
                <button type="button" class="counter-btn" id="minusBtn">—</button>
                <span class="counter-value" id="counterValue">0</span>
                <button type="button" class="counter-btn" id="plusBtn">+</button>
            </div>
            
            <!-- Hidden input to still hold the plusOnes numeric value cleanly for Google Sheet ingestion -->
            <input type="hidden" id="plusOnes" value="0">

            <button type="submit" id="submitBtn">Send Response</button>
        </form>
    </section>

    <!-- 5. Final Photo Section -->
    <section class="gallery" style="background-color: #f5ede6;">
        <h2>See You There!</h2>
        <img src="https://res.cloudinary.com/dv3yb6w5s/image/upload/v1781103483/Untitled_design_8_jrqdts.png" alt="Final Photo">
    </section>

    <script>
        // ⚠️ REPLACE THIS URL WITH YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL
        const scriptURL = 'https://docs.google.com/spreadsheets/d/1mEPzOHpckNT0AtLmMu8mjB1ZCJs986RzVcNTT7TUdx0/edit?usp=sharing';

        // Video scroll lock and layout transition logic
        const landingVideo = document.getElementById('landingVideo');
        const introOverlay = document.getElementById('intro-overlay');

        landingVideo.addEventListener('ended', function() {
            // Slide up the intro overlay screen
            introOverlay.style.transform = 'translateY(-100%)';
            // Allow scrolling on the main page content now that video is finished
            document.body.style.overflow = 'auto';
            document.body.style.overflowX = 'hidden';
        });
 // --- NEW: Dynamic Name Parser Logic ---
        // Looks at the link (e.g., ://website.com) and updates the text
        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('name');

        if (guestName) {
            // Clean up the name string from the URL
            const formattedName = decodeURIComponent(guestName);
            
            // Update the landing screen welcome message
            document.getElementById('guest-welcome').textContent = `Dear ${formattedName},`;
            
            // Update the RSVP form header message
            document.getElementById('formNameDisplay').textContent = `Dear ${formattedName},`;
            
            // Save the value inside the hidden input field for the form submission
            document.getElementById('formName').value = formattedName;
        }
        // Plus/Minus Counter Logic
        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');
        const counterValue = document.getElementById('counterValue');
        const plusOnesInput = document.getElementById('plusOnes');
        let count = 0;

        plusBtn.addEventListener('click', () => {
            count++;
            counterValue.textContent = count;
            plusOnesInput.value = count;
        });

        minusBtn.addEventListener('click', () => {
            if (count > 0) {
                count--;
                counterValue.textContent = count;
                plusOnesInput.value = count;
            }
        });
    </script>
</body>
</html>
