<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited!</title>
    <style>
        /* Reset and Global Base Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdfbf7; color: #2c3e50; overflow-x: hidden; }

        /* Fullscreen Video Overlay Setup Layer */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Centered Dynamic Heading Dynamic Overlay */
        #video-greeting {
            position: absolute;
            top: 25%; 
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000; 
            color: #ffffff; 
            font-size: 32px; 
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: capitalize;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8); 
            font-family: 'Playfair Display', 'Georgia', serif; 
            text-align: center;
            width: 90%;
            pointer-events: none; 
        }

        /* Standard Containers & Section Grid Elements */
        .section { padding: 60px 20px; max-width: 900px; margin: 0 auto; text-align: center; }
        h2 { font-size: 28px; margin-bottom: 30px; color: #34495e; text-transform: uppercase; letter-spacing: 2px; }

        /* Media Layout Component */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-grid img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Timeline Layout Architecture Component */
        .timeline { max-width: 500px; margin: 0 auto; position: relative; padding-left: 30px; text-align: left; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; width: 2px; height: 100%; background: #bdc3c7; }
        .timeline-item { position: relative; margin-bottom: 30px; }
        .timeline-item::before { content: ''; position: absolute; left: -25px; top: 5px; width: 12px; height: 12px; border-radius: 50%; background: #2ecc71; border: 2px solid white; }
        .time { font-weight: bold; color: #2ecc71; font-size: 16px; }
        .event-title { font-size: 18px; font-weight: 600; color: #2c3e50; }

        /* RSVP Form Structural Architecture */
        .rsvp-card { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 450px; margin: 0 auto; }
        #greeting { font-size: 20px; margin-bottom: 25px; font-weight: 600; color: #7f8c8d; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #34495e; }
        
        /* Custom Stepper Mechanics Elements Layout Styles */
        .stepper-wrapper { display: flex; align-items: center; justify-content: space-between; background: #f4f7f6; border: 1px solid #ccc; border-radius: 8px; padding: 6px; margin-top: 5px; }
        .step-btn { width: 40px !important; height: 40px; padding: 0 !important; margin: 0 !important; background: #ffffff !important; border: 1px solid #e0e0e0 !important; color: #2c3e50 !important; font-size: 20px !important; border-radius: 6px !important; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: all 0.2s ease; }
        .step-btn:hover { background: #2ecc71 !important; color: white !important; border-color: #2ecc71 !important; }
        .guest-display { font-size: 15px; font-weight: 600; color: #34495e; text-align: center; flex-grow: 1; }
        
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        .radio-label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .submit-btn { width: 100%; padding: 14px; background: #2ecc71; border: none; color: white; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .submit-btn:hover { background: #27ae60; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

    <!-- 1. VIDEO INTRO OVERLAY (NO LOOSE BUTTONS) -->
    <div id="intro-overlay">
        <div id="video-greeting">Dear Guest,</div>
        <video id="intro-video" autoplay muted playsinline loop>
            <source src="https://cloudinary.com" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- MAIN PAGE CONTENT LAYER -->
    <main id="main-content">
        
        <!-- 2. RUNDOWN TIMELINE SECTION -->
        <section class="section" style="background: #fcfcfc;">
            <h2>Event Rundown</h2>
            <div class="timeline">
                <div class="timeline-item">
                    <div class="time">05:00 PM</div>
                    <div class="event-title">Guest Arrival & Welcome Drinks</div>
                </div>
                <div class="timeline-item">
                    <div class="time">06:00 PM</div>
                    <div class="event-title">Main Ceremony / Opening Act</div>
                </div>
                <div class="timeline-item">
                    <div class="time">07:30 PM</div>
                    <div class="event-title">Dinner & Celebrations</div>
                </div>
                <div class="timeline-item">
                    <div class="time">10:00 PM</div>
                    <div class="event-title">Send-off</div>
                </div>
            </div>
        </section>

        <!-- 3. RSVP FORM CONTAINER SECTION -->
        <section class="section">
            <h2>RSVP</h2>
            <div class="rsvp-card">
                <div id="greeting">Dear Guest,</div>

                <form id="rsvpForm" action="https://google.com" method="POST">
                    <input type="hidden" id="guestNameInput" name="guestName">

                    <div class="form-group">
                        <label>Will you attend?</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="attendance" value="Yes" checked onclick="toggleGuests(true)"> Joyfully Accept</label>
                            <label class="radio-label"><input type="radio" name="attendance" value="No" onclick="toggleGuests(false)"> Regretfully Decline</label>
                        </div>
                    </div>

                    <!-- STEPPER PLUS MINUS COUNTER FIELD ARCHITECTURE -->
                    <div class="form-group" id="plusOneContainer">
                        <label>Bringing any additional guests?</label>
                        <div class="stepper-wrapper">
                            <button type="button" class="step-btn" onclick="changeGuestCount(-1)">−</button>
                            <input type="hidden" id="plusOnes" name="plusOnes" value="0">
                            <div id="guestDisplay" class="guest-display">Just me (0 extra guests)</div>
                            <button type="button" class="step-btn" onclick="changeGuestCount(1)">+</button>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Submit RSVP</button>
                </form>
                <div id="message"></div>
            </div>
        </section>

        <!-- 4. BOTTOM 10 PHOTO GALLERY SLOTS SLOTS ARCHITECTURE -->
        <section class="section" style="background: #fcfcfc;">
            <h2>Our Moments</h2>
            <div class="gallery-grid">
                <img src="https://picsum.photos" alt="Slot 1">
                <img src="https://picsum.photos" alt="Slot 2">
                <img src="https://picsum.photos" alt="Slot 3">
                <img src="https://picsum.photos" alt="Slot 4">
                <img src="https://picsum.photos" alt="Slot 5">
                <img src="https://picsum.photos" alt="Slot 6">
                <img src="https://picsum.photos" alt="Slot 7">
                <img src="https://picsum.photos" alt="Slot 8">
                <img src="https://picsum.photos" alt="Slot 9">
                <img src="https://picsum.photos0" alt="Slot 10">
            </div>
        </section>

    </main>

<script>
    // --- 1. INSTANT FORCE NAME RETRIEVAL BLOCK ---
    let guestName = "Guest";
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const rawName = urlParams.get('guest'); 
        if (rawName) {
            guestName = decodeURIComponent(rawName.replace(/\+/g, ' '));
        }
    } catch(e) {
        console.error("URL Reading error: ", e);
    }

    // Force change layout strings immediately without waiting for browser load wrappers
    function applyTextStrings() {
        const vidText = document.getElementById('video-greeting');
        const rsvpText = document.getElementById('greeting');
        const formInput = document.getElementById('guestNameInput');

        if (vidText) vidText.textContent = "Dear " + guestName + ",";
if (rsvpText) rsvpText.textContent = "Dear " + guestName + ",";if (formInput) formInput.value = guestName;}// Multi-phase safety trigger execution execution sequenceapplyTextStrings();window.addEventListener("DOMContentLoaded", applyTextStrings);window.addEventListener("load", applyTextStrings);// --- 2. AUTOMATIC 6-SECOND FORCE SLIDE DISMISS ENGINE ---let introDismissed = false;function dismissIntro() {if (introDismissed) return;introDismissed = true;const introOverlay = document.getElementById('intro-overlay');if (introOverlay) {introOverlay.style.transform = 'translateY(-100%)';setTimeout(function() {introOverlay.remove();}, 800);}}// Run clock countdown slider engine immediately upon file launchsetTimeout(dismissIntro, 6000);// Also watch video ending just in case the asset parses fastconst introVideo = document.getElementById('intro-video');if (introVideo) {introVideo.onended = dismissIntro;}// --- 3. PLUS MINUS ELEMENT STEPPER MECHANICAL OPERATIONS ---let currentGuestCount = 0;const maxGuests = 5;function changeGuestCount(amount) {let newCount = currentGuestCount + amount;if (newCount < 0 || newCount > maxGuests) return;currentGuestCount = newCount;document.getElementById('plusOnes').value = currentGuestCount;const displayElement = document.getElementById('guestDisplay');if (displayElement) {if (currentGuestCount === 0) {displayElement.textContent = "Just me (0 extra guests)";} else if (currentGuestCount === 1) {displayElement.textContent = "+1 Extra Guest";} else {displayElement.textContent = "+" + currentGuestCount + " Extra Guests";}}}function toggleGuests(isAttending) {const container = document.getElementById('plusOneContainer');if (container) container.style.display = isAttending ? 'block' : 'none';if (!isAttending) {currentGuestCount = 0;if (document.getElementById('plusOnes')) document.getElementById('plusOnes').value = "0";if (document.getElementById('guestDisplay')) document.getElementById('guestDisplay').textContent = "Just me (0 extra guests)";}}// --- 4. DATA TRANSMISSION ENDPOINT API AGENT ---const form = document.getElementById('rsvpForm');const msg = document.getElementById('message');if (form) {form.addEventListener('submit', function(e) {e.preventDefault();if (msg) msg.textContent = "Submitting...";fetch(form.action, { method: 'POST', body: new FormData(form)}).then(function(res) {if (msg) msg.textContent = "Thank you! Your RSVP has been saved.";form.reset();applyTextStrings(); // Relock fields back down cleanly}).catch(function(err) {if (msg) msg.textContent = "Error submitting RSVP. Please try again.";console.error('Submission processing failure!', err);});});}
