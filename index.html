<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are Invited!</title>
    <style>
        :root {
            --primary-color: #c49a6c; /* Elegant muted gold/rose tone */
            --bg-color: #faf4f5;      /* Your requested background color */
            --card-bg: #ffffff;
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Playfair Display', 'Georgia', serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            overflow-x: hidden;
        }

        /* --- Intro Video Overlay --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: white;
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .intro-content {
            position: relative;
            z-index: 10;
            pointer-events: none; 
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 12px;
            backdrop-filter: blur(3px);
        }

        .intro-content h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: 400;
        }

        .intro-content p {
            font-size: 1.1rem;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        /* --- Main Content Layout --- */
        section {
            padding: 90px 20px;
            max-width: 850px;
            margin: 0 auto;
        }

        h2 {
            font-size: 2.2rem;
            color: var(--primary-color);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
        }

        /* Section Divider */
        .divider {
            border: 0;
            border-top: 1px solid #e8dedf;
            width: 40%;
            margin: 0 auto;
        }

        /* Photos Layout */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .photo-gallery img, .single-photo img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        
        .photo-gallery img:hover {
            transform: scale(1.02);
        }

        /* Address Box */
        .address-box {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .address-box h3 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        /* Rundown Flow */
        .rundown-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .rundown-item {
            background: var(--card-bg);
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .rundown-item h3 {
            color: var(--primary-color);
            font-size: 1.3rem;
            font-weight: 600;
            min-width: 110px;
        }

        .rundown-item p {
            font-size: 1.1rem;
            color: var(--text-color);
        }

        /* RSVP Form Styling */
        form {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }
